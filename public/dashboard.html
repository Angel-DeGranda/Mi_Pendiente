<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Mi Pendiente</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet'>
</head>

<body>
    <!-- barra de navegación -->
    <nav class="menu-principal">
        <button class="menu-hamburger" id="menu-hamburger">&#9776</button>
        <h2 class="menu-principal-titulo">Mi Pendiente</h2>
        <div class="menu-links">
            <a href="dashboard.html"> Inicio</a>
            <a href="materias.html">Materias</a>
            <a href="tareas.html">Tareas</a>
            <a href="configuracion.html">Configuración</a>
        </div>
        <button class="menu-principal-cerrar-sesion">Cerrar sesión</button>
    </nav>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-titulo">Mi Pendiente</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">Inicio</a>
            <a href="materias.html">Materias</a>
            <a href="tareas.html">Tareas</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
        <div class="sidebar-footer">
            <button class="menu-principal-cerrar-sesion">Cerrar sesión</button>
        </div>
    </aside>

    <!-- Contenido de la pagina -->
    <main class="dashboard-main">

        <section class="dashboard-header">
            <h1 id="dashboard-saludo"></h1>
            <p id="dashboard-fecha"></p>
        </section>

        <section class="dashboard-stats">
            <div class="stat-card">
                <span class="stat-numero" id="stat-pendientes">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-card stat-card-completadas">
                <span class="stat-numero" id="stat-completadas">0</span>
                <span class="stat-label">Completadas</span>
            </div>
            <div class="stat-card stat-card-prioridad-alta">
                <span class="stat-numero" id="stat-prioridad-alta">0</span>
                <span class="stat-label">Alta prioridad</span>
            </div>
            <div class="stat-card stat-card-vencidas">
                <span class="stat-numero" id="stat-vencidas">0</span>
                <span class="stat-label">Vencidas</span>
            </div>
        </section>

        <section class="dashboard-seccion">
            <h2 class="dashboard-seccion-titulo">Calendario de tareas</h2>
            <div id="dashboard-calendario"></div>
        </section>

        <section class="dashboard-seccion">
            <h2 class="dashboard-seccion-titulo">Tareas pendientes</h2>
            <div id="lista-pendientes"></div>
        </section>

        <section class="dashboard-seccion">
            <h2 class="dashboard-seccion-titulo">Tareas completadas de hoy</h2>
            <div id="lista-completadas-hoy"></div>
        </section>

    </main>

    <div class="modal" id="modal-detalle-tarea">
        <section>
            <div class="modal-header">
                <h2>detalle de la tarea</h2>
            </div>
            <div class="modal-detalle-contenido">
                <span class="modal-detalle-materia" id="detalle-materia"></span>
                <p class="modal-detalle-descripcion" id="detalle-descripcion"></p>
                <div class="modal-detalle-info">
                    <span id="detalle-fecha"></span>
                    <span id="detalle-hora" class="oculto"></span>
                </div>
                <div class="modal-detalle-badges">
                    <span id="detalle-prioridad"></span>
                    <span id="detalle-estado"></span>
                </div>
            </div>
            <div class="modal-detalle-footer">
                <a href="tareas.html" class="boton-ir-tareas">Ir a tareas</a>
                <button class="boton-confirmar-cancelar" id="cerar-modal-detalle-footer">cerrar</button>
            </div>
        </section>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src="js/dashboard.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
