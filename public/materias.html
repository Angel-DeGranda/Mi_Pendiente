<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="menu-principal">
        <h2 class="menu-principal-titulo">Mi Pendiente</h2>
        <button class="menu-principal-cerrar-sesion">Cerrar sesión</button>
    </nav>
    <section class="section-alta">
        <h2 class="form-titulo">Agregar nueva materia</h2>
        <form class="form-alta">
            <label for="form-materia">Nombre de la materia:</label>
            <input type="text" name="nombre-materia" id="form-materia">
            <div>
                <fieldset>
                    <legend class="legenda-lista-dias">Día(s) de la semana que tienes la clase:</legend>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Lunes</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Martes</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Miércoles</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Jueves</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Viernes</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Sábado</label>
                    <label class="dia-label"><input type="checkbox" class="dia-semana">Domingo</label>
                </fieldset>
            </div>
            <button type="submit" class="boton-alta">Guardar materia</button>
        </form>
    </section>
    <section class="section-consulta">
        <h2 class="consulta-titulo">Mis materias del semestre</h2>
        <div class="tabla-materias-contenedor">
            <article class="card">
                <header class="card-header">
                    <h3 class="card-title">Aplicaciones Web</h3>
                </header>
                
                <div class="card-listado-contenedor">
                    <p class="listado-titulo"><strong>Días de clase:</strong></p>
                    <ul class="dias-lista">
                        <li>Lunes</li>
                        <li>Miércoles</li>
                        <li>Viernes</li>
                    </ul>
                </div>
                <button class="card-button-editar" title="Editar materia">Editar</button>
                <button class="card-button-eliminar" title="Eliminar materia">Eliminar</button>
            </article>
        </div>
    </section>
    <div id="modal-editar-materia" class="modal">
        <section>
            <header class="modal-header">
                <h2>Editar materia</h2>
                <button id="cerrar-modal" class="button-cerrar-modal">&times;</button>
            </header>
            <form id="form-editar-materia" class="form-editar">
                <input type="hidden" id="form-editar-materia-id">
                <label for="form-materia">Nombre de la materia:</label>
                <input type="text" name="nombre-materia" id=" form-materia">
                <div>
                    <fieldset>
                        <legend class="legenda-lista-dias">Día(s) de la semana que tienes la clase:</legend>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Lunes</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Martes</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Miércoles</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Jueves</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Viernes</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Sábado</label>
                        <label class="dia-label"><input type="checkbox" class="dia-semana">Domingo</label>
                    </fieldset>
                </div>
                <button type="submit" class="boton-alta">Guardar cambios</button>
            </form>
        </section>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
