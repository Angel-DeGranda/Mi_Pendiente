<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login_style.css">
</head>
<body>
    <main>
        <section class="login-card">
            <header class="login-card-header">
                <h1 class="login-card-titulo">Mi Pendiente</h1>
                <p class="login-card-descipcion">Inicio de sesión</p>
            </header>
            <form class="login-form-form">
                <label for="login-form-email">Correo electrónico:</label>
                <input type="email" name="email" id="login-form-email" placeholder="Email">
                <label for="login-form-password">Contraseña:</label>
                <input type="password" name="password" id="login-form-password" placeholder="Contraseña">
                <p class="login-form-mensaje-error" hidden>Correo y contraseña incorrectos, intentalo de nuevo.</p>
                <button type="submit" class="login-form-button">Iniciar sesión</button>
                <footer></footer>
            </form>
        </section>
    </main>

</body>
</html>
